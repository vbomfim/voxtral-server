apiVersion: apps/v1
kind: Deployment
metadata:
  name: voxtral-server
  namespace: opentts
  labels:
    app.kubernetes.io/name: voxtral-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: voxtral-server
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: voxtral-server
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voxtral-server
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: voxtral-server
    spec:
      serviceAccountName: voxtral-server
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: voxtral-server
              app.kubernetes.io/component: server
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: voxtral-server
              app.kubernetes.io/component: server
      containers:
        - name: voxtral-server
          image: ghcr.io/vbomfim/voxtral-server:latest
          ports:
            - containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: voxtral-server-config
          env:
            - name: TTS_MODEL_PATH
              value: /models/voxtral-4b
            - name: TTS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voxtral-server-secrets
                  key: TTS_API_KEY
                  optional: true
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu: "4"
              memory: 18Gi
            limits:
              cpu: "8"
              memory: 24Gi
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: voxtral-model-storage

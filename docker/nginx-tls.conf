# nginx-tls.conf
# TLS-terminating reverse proxy for the voxtral-server.
# Proxies HTTPS → HTTP to the upstream container.

upstream voxtral {
    server voxtral-server:9090;
}

server {
    listen 443 ssl;
    server_name voxtral.example.com;

    # --- TLS certificates ---------------------------------------------------
    # For Let's Encrypt, point these to the certbot-managed files:
    #   ssl_certificate     /etc/letsencrypt/live/voxtral.example.com/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/voxtral.example.com/privkey.pem;
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    # TLS 1.2 cipher suite: Mozilla Intermediate (ECDHE-only).
    # TLS 1.3 ciphers use strong defaults (AES-GCM, ChaCha20-Poly1305).
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    # TLS session hardening
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — uncomment when using CA-signed certificates
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 1.1.1.1 8.8.8.8 valid=300s;
    # resolver_timeout 5s;

    # --- Security headers ----------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- HTTP proxy ----------------------------------------------------------
    location / {
        proxy_pass http://voxtral;
        proxy_http_version 1.1;

        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for TTS inference (large text → long synthesis)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Allow up to 1MB request bodies (for large text payloads)
        client_max_body_size 1m;
    }
}

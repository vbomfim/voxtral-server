apiVersion: v1
kind: ResourceQuota
metadata:
  name: voxtral-quota
  namespace: opentts
  labels:
    app.kubernetes.io/part-of: voxtral-server
    app.kubernetes.io/managed-by: kubectl
spec:
  hard:
    # Sized for TTS workload: 2 CPU pods + 1 GPU pod
    # CPU: 2 × (4 req / 8 lim) = 8/16 CPU
    # GPU: 1 × (4 req / 8 lim) = 4/8 CPU + 1 GPU
    # Memory CPU: 2 × (18 req / 24 lim) = 36/48 Gi
    # Memory GPU: 1 × (12 req / 20 lim) = 12/20 Gi
    requests.cpu: "20"
    requests.memory: "64Gi"
    limits.cpu: "40"
    limits.memory: "96Gi"
    pods: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: voxtral-limits
  namespace: opentts
  labels:
    app.kubernetes.io/part-of: voxtral-server
    app.kubernetes.io/managed-by: kubectl
spec:
  limits:
    - type: Container
      default:
        cpu: "4"
        memory: "18Gi"
      defaultRequest:
        cpu: "1"
        memory: "4Gi"
      max:
        cpu: "8"
        memory: "32Gi"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: voxtral-server-gpu
  namespace: opentts
  labels:
    app.kubernetes.io/name: voxtral-server
    app.kubernetes.io/component: server-gpu
    app.kubernetes.io/part-of: voxtral-server
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: voxtral-server
      app.kubernetes.io/component: server-gpu
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voxtral-server
        app.kubernetes.io/component: server-gpu
        app.kubernetes.io/part-of: voxtral-server
    spec:
      serviceAccountName: voxtral-server
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: voxtral-server
              app.kubernetes.io/component: server-gpu
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: voxtral-server
              app.kubernetes.io/component: server-gpu
      containers:
        - name: voxtral-server
          image: ghcr.io/vbomfim/voxtral-server:latest-cuda
          ports:
            - containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: voxtral-server-config
          env:
            - name: TTS_MODEL_PATH
              value: /models/voxtral-4b
            - name: TTS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voxtral-server-secrets
                  key: TTS_API_KEY
                  optional: true
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cuda-cache
              mountPath: /home/nonroot/.nv
          resources:
            requests:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: 1
            limits:
              cpu: "8"
              memory: 20Gi
              nvidia.com/gpu: 1
          # Startup probe: 15 minutes (failureThreshold 90 × periodSeconds 10)
          # GPU model loading is significantly slower than CPU
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            failureThreshold: 90
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: voxtral-model-storage
        # CUDA requires writable /tmp and ~/.nv for JIT compilation cache
        - name: tmp
          emptyDir: {}
        - name: cuda-cache
          emptyDir: {}
